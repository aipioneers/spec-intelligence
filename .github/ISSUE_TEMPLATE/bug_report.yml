name: Bug Report
description: Report a bug in spec-intelligence
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Open the web UI
        2. Click "New Feature"
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or screenshots.
  - type: input
    id: environment
    attributes:
      label: Environment
      description: "OS, Node.js version, browser"
      placeholder: "macOS 15, Node.js 22, Chrome 130"
